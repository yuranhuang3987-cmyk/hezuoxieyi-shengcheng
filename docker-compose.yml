version: '3.8'

services:
  agreement-generator:
    build: .
    container_name: agreement-generator
    # 时区设为北京时间，历史记录创建时间等按东八区显示
    environment:
      - TZ=Asia/Shanghai
    ports:
      - "80:80"
    volumes:
      # 持久化数据库
      - ./data:/app/database
      # 持久化上传文件
      - ./uploads:/app/backend/uploads
      # 持久化输出文件
      - ./outputs:/app/backend/outputs
    restart: unless-stopped
