version: '3.8'

services:
  agreement-generator:
    build: .
    container_name: agreement-generator
    ports:
      - "80:80"
    volumes:
      # 持久化数据库
      - ./data:/app/backend/data
      # 持久化上传文件
      - ./uploads:/app/backend/uploads
      # 持久化输出文件
      - ./outputs:/app/backend/outputs
    restart: unless-stopped
